name: Production Operating Day Heartbeat

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run planner only without provider calls or mutations"
        required: false
        default: "false"
  schedule:
    - cron: "14,44 * * * *"

concurrency:
  group: production-operating-day-runtime
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PICK_ANALYZER_BASE_URL: https://pick-analyzer.vercel.app
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Call protected production operating-day heartbeat
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing CRON_SECRET repository secret."
            exit 1
          fi

          echo "Dispatch type: ${GITHUB_EVENT_NAME}"
          echo "Commit SHA: ${GITHUB_SHA}"

          response_file="$(mktemp)"
          status_code="$(curl --show-error --silent --max-time 120 \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${PICK_ANALYZER_BASE_URL%/}/api/cron/operating-day?dryRun=${DRY_RUN}")"

          echo "Operating-day heartbeat HTTP ${status_code}"
          head -c 4000 "${response_file}"
          echo

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            exit 1
          fi
